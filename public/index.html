<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חלוקת פריטים לברביקיו 🔥</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --f1-bg:#dbeafe;--f1-border:#3b82f6;--f1-text:#1e3a8a;
      --f2-bg:#d1fae5;--f2-border:#10b981;--f2-text:#064e3b;
      --f3-bg:#fef3c7;--f3-border:#f59e0b;--f3-text:#78350f;
      --f4-bg:#ede9fe;--f4-border:#8b5cf6;--f4-text:#4c1d95;
      --f5-bg:#fce7f3;--f5-border:#ec4899;--f5-text:#831843;
      --bg:#f0ede8;--card:#fff;--border:#dedad4;
      --text:#1a1a1a;--muted:#6b6b6b;--faint:#aaa;
      --r:10px;--rs:7px;
    }
    body { font-family:'Segoe UI','Arial',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }
    .page { padding:1.25rem 1.25rem 4rem; }
    .header { margin-bottom:1rem; }
    .header h1 { font-size:1.35rem; font-weight:700; }
    .header p { font-size:.82rem; color:var(--muted); margin-top:3px; }
    .topbar { display:flex; align-items:center; gap:12px; margin-bottom:1rem; flex-wrap:wrap; }
    .tabs { display:flex; gap:3px; background:#dedad4; border-radius:var(--rs); padding:3px; width:fit-content; }
    .tab { padding:5px 16px; border-radius:6px; font-size:.82rem; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:inherit; }
    .tab.active { background:var(--card); color:var(--text); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .sync-bar { display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--muted); margin-right:auto; }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:#10b981; transition:background .3s; }
    .sync-dot.syncing { background:#f59e0b; }
    .sync-dot.error { background:#ef4444; }
    .copy-btn { padding:6px 14px; border-radius:var(--rs); border:1.5px solid var(--border); background:var(--card); font-size:.82rem; cursor:pointer; font-family:inherit; font-weight:600; white-space:nowrap; transition:background .15s; }
    .copy-btn:hover { background:#e8e5e0; }

    /* Board */
    .board-wrap { overflow-x:auto; padding-bottom:6px; scrollbar-width:thin; scrollbar-color:#ccc transparent; }
    .board { display:flex; gap:10px; min-width:max-content; align-items:flex-start; }

    /* Column */
    .col { width:160px; border-radius:var(--r); background:var(--card); border:1.5px solid var(--border); display:flex; flex-direction:column; min-height:260px; transition:border-color .15s,background .15s; flex-shrink:0; }
    .col.f1{border-color:var(--f1-border);} .col.f2{border-color:var(--f2-border);} .col.f3{border-color:var(--f3-border);} .col.f4{border-color:var(--f4-border);} .col.f5{border-color:var(--f5-border);}
    .col.drag-over{border-style:dashed;}
    .col.f1.drag-over{background:#eff6ff;border-color:var(--f1-border);} .col.f2.drag-over{background:#ecfdf5;border-color:var(--f2-border);} .col.f3.drag-over{background:#fffbeb;border-color:var(--f3-border);} .col.f4.drag-over{background:#f5f3ff;border-color:var(--f4-border);} .col.f5.drag-over{background:#fdf2f8;border-color:var(--f5-border);}
    .col-header { padding:10px 12px 8px; border-bottom:1.5px solid var(--border); border-radius:calc(var(--r) - 1px) calc(var(--r) - 1px) 0 0; }
    .col.f1 .col-header{background:var(--f1-bg);} .col.f2 .col-header{background:var(--f2-bg);} .col.f3 .col-header{background:var(--f3-bg);} .col.f4 .col-header{background:var(--f4-bg);} .col.f5 .col-header{background:var(--f5-bg);}
    .col-name { font-size:.82rem; font-weight:700; line-height:1.3; margin-bottom:2px; }
    .col.f1 .col-name{color:var(--f1-text);} .col.f2 .col-name{color:var(--f2-text);} .col.f3 .col-name{color:var(--f3-text);} .col.f4 .col-name{color:var(--f4-text);} .col.f5 .col-name{color:var(--f5-text);}
    .col-count { font-size:.7rem; opacity:.6; }
    .col-body { padding:8px; display:flex; flex-direction:column; flex:1; }
    .cat-lbl { font-size:.62rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); margin:6px 0 4px; }
    .cat-lbl:first-child { margin-top:0; }
    .item-card { padding:7px 10px; border-radius:8px; font-size:.82rem; font-weight:500; cursor:grab; border:1px solid transparent; margin-bottom:5px; user-select:none; transition:box-shadow .15s,transform .1s,opacity .15s; }
    .item-card:hover { box-shadow:0 2px 6px rgba(0,0,0,.1); transform:translateY(-1px); }
    .item-card:active { cursor:grabbing; }
    .item-card.dragging { opacity:.3; transform:scale(.95); box-shadow:none; }
    .col.f1 .item-card{background:var(--f1-bg);border-color:#93c5fd;color:var(--f1-text);}
    .col.f2 .item-card{background:var(--f2-bg);border-color:#6ee7b7;color:var(--f2-text);}
    .col.f3 .item-card{background:var(--f3-bg);border-color:#fcd34d;color:var(--f3-text);}
    .col.f4 .item-card{background:var(--f4-bg);border-color:#c4b5fd;color:var(--f4-text);}
    .col.f5 .item-card{background:var(--f5-bg);border-color:#f9a8d4;color:var(--f5-text);}
    .col-empty { font-size:.75rem; color:var(--faint); padding:10px 4px; text-align:center; line-height:1.5; }

    /* Unassigned section */
    .unassigned-section { margin-top:14px; background:var(--card); border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; transition:background .15s,border-color .15s; }
    .unassigned-section.drag-over { border-style:dashed; border-color:#aaa; background:#f5f3ef; }
    .unassigned-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .u-title { font-size:.85rem; font-weight:700; color:var(--muted); }
    .u-count { font-size:.72rem; color:var(--faint); }
    .unassigned-cats { display:flex; flex-direction:column; gap:10px; }
    .ucat-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .ucat-label { font-size:.7rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); white-space:nowrap; min-width:60px; flex-shrink:0; padding-top:4px; }
    .ucat-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .u-chip { padding:5px 12px; border-radius:100px; font-size:.82rem; font-weight:500; cursor:grab; user-select:none; border:1.5px solid var(--border); background:#eceae6; color:#444; transition:box-shadow .15s,transform .1s,opacity .15s; }
    .u-chip:hover { box-shadow:0 2px 6px rgba(0,0,0,.1); transform:translateY(-1px); }
    .u-chip:active { cursor:grabbing; }
    .u-chip.dragging { opacity:.3; }
    .all-done { font-size:.82rem; color:var(--faint); text-align:center; padding:4px; }

    /* Edit tab */
    .edit-section { max-width:600px; }
    .section-label { font-size:.7rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; margin-top:1.25rem; }
    .input-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .input-row input,.input-row select { padding:8px 12px; border-radius:var(--rs); border:1.5px solid var(--border); background:var(--card); font-size:.875rem; color:var(--text); font-family:inherit; direction:rtl; }
    .input-row input:focus,.input-row select:focus { outline:none; border-color:#888; }
    .btn { padding:8px 16px; border-radius:var(--rs); border:1.5px solid var(--border); background:var(--card); font-size:.875rem; cursor:pointer; color:var(--text); font-family:inherit; font-weight:600; transition:background .15s; white-space:nowrap; }
    .btn:hover { background:#e8e5e0; }
    .btn.primary { background:var(--text); color:#fff; border-color:var(--text); }
    .btn.primary:hover { opacity:.85; }
    .edit-item { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:100px; border:1.5px solid var(--border); background:var(--card); font-size:.82rem; margin:3px; }
    .rename-btn { cursor:pointer; color:var(--muted); font-size:.72rem; text-decoration:underline; background:none; border:none; font-family:inherit; padding:0; }
    .rename-btn:hover { color:var(--text); }
    .del-btn { cursor:pointer; color:var(--faint); font-size:.72rem; background:none; border:none; font-family:inherit; padding:0; line-height:1; }
    .del-btn:hover { color:#ef4444; }
    .cat-block-edit { margin-bottom:1.25rem; }
    .cat-name-edit { font-size:.75rem; color:var(--faint); font-weight:600; margin-bottom:6px; }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>🔥 חלוקת פריטים לברביקיו</h1>
    <p>גררו פריטים מהרשימה למטה לעמודה של המשפחה המתאימה</p>
  </div>
  <div class="topbar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('assign')">שיוך פריטים</button>
      <button class="tab" onclick="switchTab('edit')">עריכת פריטים</button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">מסנכרן...</span>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copySummary()" style="display:none;">העתק לווצאפ</button>
  </div>

  <div id="tab-assign">
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="unassigned-section" id="unassigned-section">
      <div class="unassigned-header">
        <span class="u-title">לא משוייך</span>
        <span class="u-count" id="u-count"></span>
      </div>
      <div class="unassigned-cats" id="unassigned-cats"></div>
    </div>
  </div>

  <div id="tab-edit" style="display:none;">
    <div class="edit-section">
      <div class="section-label">הוספת פריט חדש</div>
      <div class="input-row">
        <input type="text" id="new-item-name" placeholder="שם הפריט..." style="width:160px;" />
        <select id="new-item-cat"></select>
        <button class="btn primary" onclick="addItem()">+ הוסף</button>
      </div>
      <div class="section-label">כל הפריטים</div>
      <div id="edit-items"></div>
    </div>
  </div>
</div>

<script>
const FAMILIES = [
  {name:'יוסי ואודיה',  label:'יוסי ואודיה',  cls:'f1'},
  {name:'עירן ואביבית', label:'עירן ואביבית', cls:'f2'},
  {name:'אושרית ויעקב', label:'אושרית ויעקב', cls:'f3'},
  {name:'שי ולירן',     label:'שי ולירן',      cls:'f4'},
  {name:'אמא',          label:'אמא',            cls:'f5'},
];
const CAT_ORDER = ['חד פעמי','אוכל','תבלינים','שתייה','ציוד','ריהוט'];
let state = {items:[],assignments:{}};
let currentTab = 'assign';
let isSaving = false;
let draggedItem = null;

async function api(method, path, body) {
  const res = await fetch('/api'+path, {method, headers: body?{'Content-Type':'application/json'}:{}, body: body?JSON.stringify(body):undefined});
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
function setSyncStatus(s) {
  document.getElementById('sync-dot').className = 'sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  document.getElementById('sync-label').textContent = s==='syncing'?'מסנכרן...':s==='error'?'שגיאת חיבור':'מסונכרן ✓';
}
async function fetchState() {
  if (isSaving) return;
  setSyncStatus('syncing');
  try { state = await api('GET','/state'); setSyncStatus('ok'); renderAll(); }
  catch { setSyncStatus('error'); }
}
async function assignItem(itemName, familyName) {
  isSaving = true; setSyncStatus('syncing');
  try {
    if (familyName===null) await api('DELETE','/assign/'+encodeURIComponent(itemName));
    else await api('POST','/assign',{item_name:itemName, family_name:familyName});
    setSyncStatus('ok');
  } catch { setSyncStatus('error'); }
  finally { isSaving = false; }
}
function applyDrop(itemName, familyName) {
  const current = state.assignments[itemName]||null;
  if (current===familyName) return;
  if (familyName===null) delete state.assignments[itemName];
  else state.assignments[itemName] = familyName;
  renderAll();
  assignItem(itemName, familyName);
}

// Mouse drag
function makeDraggable(el, itemName) {
  el.draggable = true;
  el.addEventListener('dragstart', e => {
    draggedItem = itemName;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', itemName);
    setTimeout(() => document.querySelectorAll(`[data-item]`).forEach(x => { if(x.dataset.item===itemName) x.classList.add('dragging'); }), 0);
  });
  el.addEventListener('dragend', () => {
    document.querySelectorAll('.dragging').forEach(x=>x.classList.remove('dragging'));
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    draggedItem = null;
  });
}
function makeDropTarget(el, familyName) {
  el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-over');
    const n = e.dataTransfer.getData('text/plain')||draggedItem;
    if (n) applyDrop(n, familyName);
  });
}

// Touch drag
let touchItem=null, touchClone=null, touchOffX=0, touchOffY=0;
function makeTouchDraggable(el, itemName) {
  el.addEventListener('touchstart', e => {
    touchItem = itemName;
    const r = el.getBoundingClientRect();
    touchOffX = e.touches[0].clientX-r.left; touchOffY = e.touches[0].clientY-r.top;
    touchClone = el.cloneNode(true);
    touchClone.style.cssText = `position:fixed;z-index:9999;pointer-events:none;opacity:.8;width:${r.width}px;left:${e.touches[0].clientX-touchOffX}px;top:${e.touches[0].clientY-touchOffY}px;`;
    document.body.appendChild(touchClone);
    el.classList.add('dragging');
  }, {passive:true});
}
document.addEventListener('touchmove', e => {
  if (!touchItem) return; e.preventDefault();
  const t = e.touches[0];
  if (touchClone) { touchClone.style.left=(t.clientX-touchOffX)+'px'; touchClone.style.top=(t.clientY-touchOffY)+'px'; }
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const target = under&&(under.closest('.col')||under.closest('.unassigned-section'));
  if (target) target.classList.add('drag-over');
}, {passive:false});
document.addEventListener('touchend', e => {
  if (!touchItem) return;
  const t = e.changedTouches[0];
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  document.querySelectorAll('.dragging').forEach(x=>x.classList.remove('dragging'));
  if (touchClone) { touchClone.remove(); touchClone=null; }
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const col = under&&under.closest('.col');
  const unsec = under&&under.closest('.unassigned-section');
  const n = touchItem; touchItem=null;
  if (col) applyDrop(n, col.dataset.family);
  else if (unsec) applyDrop(n, null);
});

// Render board
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  FAMILIES.forEach(f => {
    const fItems = state.items.filter(i => state.assignments[i.name]===f.name);
    const col = document.createElement('div');
    col.className = `col ${f.cls}`; col.dataset.family = f.name;
    col.innerHTML = `<div class="col-header"><div class="col-name">${f.label}</div><div class="col-count">${fItems.length} פריטים</div></div>`;
    const body = document.createElement('div'); body.className='col-body';
    if (!fItems.length) {
      body.innerHTML = `<div class="col-empty">גרור פריטים לכאן</div>`;
    } else {
      const catMap = {}; CAT_ORDER.forEach(c=>{catMap[c]=[];});
      fItems.forEach(item => { if(!catMap[item.category])catMap[item.category]=[]; catMap[item.category].push(item); });
      const activeCats = [...CAT_ORDER,...Object.keys(catMap).filter(c=>!CAT_ORDER.includes(c))].filter(c=>catMap[c]&&catMap[c].length);
      const showLabels = activeCats.length>1;
      activeCats.forEach(cat => {
        if (showLabels) { const l=document.createElement('div'); l.className='cat-lbl'; l.textContent=cat; body.appendChild(l); }
        catMap[cat].forEach(item => {
          const card = document.createElement('div');
          card.className='item-card'; card.textContent=item.name; card.dataset.item=item.name;
          makeDraggable(card, item.name); makeTouchDraggable(card, item.name);
          body.appendChild(card);
        });
      });
    }
    col.appendChild(body); makeDropTarget(col, f.name); board.appendChild(col);
  });
}

// Render unassigned
function renderUnassigned() {
  const unassigned = state.items.filter(i => !state.assignments[i.name]);
  document.getElementById('u-count').textContent = unassigned.length ? `${unassigned.length} פריטים` : '';
  const container = document.getElementById('unassigned-cats');
  container.innerHTML = '';
  if (!unassigned.length) { container.innerHTML='<div class="all-done">🎉 כל הפריטים שויכו!</div>'; return; }
  const catMap = {}; CAT_ORDER.forEach(c=>{catMap[c]=[];});
  unassigned.forEach(item => { if(!catMap[item.category])catMap[item.category]=[]; catMap[item.category].push(item); });
  const activeCats = [...CAT_ORDER,...Object.keys(catMap).filter(c=>!CAT_ORDER.includes(c))].filter(c=>catMap[c]&&catMap[c].length);
  activeCats.forEach(cat => {
    const row = document.createElement('div'); row.className='ucat-row';
    row.innerHTML = `<div class="ucat-label">${cat}</div>`;
    const chips = document.createElement('div'); chips.className='ucat-chips';
    catMap[cat].forEach(item => {
      const chip = document.createElement('div');
      chip.className='u-chip'; chip.textContent=item.name; chip.dataset.item=item.name;
      makeDraggable(chip, item.name); makeTouchDraggable(chip, item.name);
      chips.appendChild(chip);
    });
    row.appendChild(chips); container.appendChild(row);
  });
  const sec = document.getElementById('unassigned-section');
  makeDropTarget(sec, null);
}

// Edit tab
function renderEditItems() {
  const container = document.getElementById('edit-items'); container.innerHTML='';
  const groups={}; CAT_ORDER.forEach(c=>{groups[c]=[];});
  state.items.forEach(item => { if(!groups[item.category])groups[item.category]=[]; groups[item.category].push(item); });
  Object.entries(groups).forEach(([cat,items]) => {
    const block=document.createElement('div'); block.className='cat-block-edit';
    block.innerHTML=`<div class="cat-name-edit">${cat}</div>`;
    const row=document.createElement('div');
    items.forEach(item => {
      const el=document.createElement('span'); el.className='edit-item';
      const s=item.name.replace(/'/g,"\\'");
      el.innerHTML=`${item.name}<button class="rename-btn" onclick="renameItem('${s}')">שנה שם</button><button class="del-btn" onclick="deleteItem('${s}')">✕</button>`;
      row.appendChild(el);
    });
    if (!items.length) { const e=document.createElement('span'); e.style.cssText='font-size:.78rem;color:var(--faint);'; e.textContent='אין פריטים'; row.appendChild(e); }
    block.appendChild(row); container.appendChild(block);
  });
}
function renderCatSelect() {
  const sel=document.getElementById('new-item-cat');
  const cats=[...new Set([...CAT_ORDER,...state.items.map(i=>i.category)])];
  sel.innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
async function addItem() {
  const nameEl=document.getElementById('new-item-name'), catEl=document.getElementById('new-item-cat');
  const name=nameEl.value.trim(), category=catEl.value;
  if (!name||!category) return;
  if (state.items.find(i=>i.name===name)) { nameEl.style.borderColor='#ef4444'; setTimeout(()=>nameEl.style.borderColor='',1000); return; }
  try { await api('POST','/items',{name,category}); nameEl.value=''; await fetchState(); } catch { alert('שגיאה'); }
}
async function deleteItem(name) {
  if (!confirm(`למחוק את "${name}"?`)) return;
  try { await api('DELETE','/items/'+encodeURIComponent(name)); await fetchState(); } catch { alert('שגיאה'); }
}
async function renameItem(oldName) {
  const n=prompt('שם חדש:',oldName);
  if (!n||n.trim()===oldName) return;
  try { await api('PUT','/items/'+encodeURIComponent(oldName),{name:n.trim()}); await fetchState(); } catch { alert('שגיאה'); }
}
function updateCopyBtn() {
  const has=FAMILIES.some(f=>state.items.some(i=>state.assignments[i.name]===f.name));
  document.getElementById('copy-btn').style.display=has?'':'none';
}
function copySummary() {
  let text='🔥 חלוקת פריטים לברביקיו\n\n';
  FAMILIES.forEach(f => {
    const fi=state.items.filter(i=>state.assignments[i.name]===f.name);
    text+=`*${f.label}:*\n${fi.length?fi.map(i=>`  • ${i.name}`).join('\n'):'  (לא שויך עדיין)'}\n\n`;
  });
  const ua=state.items.filter(i=>!state.assignments[i.name]);
  if (ua.length) text+=`*לא משוייך:* ${ua.map(i=>i.name).join(', ')}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-btn'); btn.textContent='הועתק! ✓';
    setTimeout(()=>btn.textContent='העתק לווצאפ',2000);
  });
}
function switchTab(tab) {
  currentTab=tab;
  document.getElementById('tab-assign').style.display=tab==='assign'?'':'none';
  document.getElementById('tab-edit').style.display=tab==='edit'?'':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='assign')||(i===1&&tab==='edit')));
  renderAll();
}
function renderAll() {
  if (currentTab==='assign') { renderBoard(); renderUnassigned(); updateCopyBtn(); }
  else { renderEditItems(); renderCatSelect(); }
}
document.getElementById('new-item-name').addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});
fetchState();
setInterval(fetchState,3000);
</script>
</body>
</html>
